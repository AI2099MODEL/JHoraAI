#:schema node_modules/wrangler/config-schema.json
name = "jhoraai"
compatibility_date = "2026-07-15"

# Static frontend only. The Node.js backend (server.ts) does NOT run here —
# it requires filesystem access, child_process, and raw SMTP sockets, none
# of which Cloudflare Workers supports (even with nodejs_compat).
# See /docs/DEPLOYMENT_ARCHITECTURE.md for the full split explanation.
[assets]
directory = "dist"

[vars]
# JHoraAI Professional Firebase & API Configurations
# These environment variables are used by the Vite build process.
# Replace placeholders with production values in the Cloudflare Pages Dashboard
# (Settings > Environment Variables), not by editing this file directly for secrets.
VITE_FIREBASE_API_KEY = ""
VITE_FIREBASE_AUTH_DOMAIN = ""
VITE_FIREBASE_PROJECT_ID = ""
VITE_FIREBASE_STORAGE_BUCKET = ""
VITE_FIREBASE_MESSAGING_SENDER_ID = ""
VITE_FIREBASE_APP_ID = ""
# Points at the Cloud Run backend running server.ts — set this to your
# actual deployed Cloud Run service URL once you have it (see Step 4 below).
VITE_JHORA_API_URL = "https://jhoraai-backend-XXXXXXXXX.run.app"
