#:schema node_modules/wrangler/config-schema.json
name = "jhoraai-professional"
compatibility_date = "2026-07-15"

[pages]
build_output_directory = "dist"

[vars]
# JHoraAI Professional Firebase & API Configurations
# These environment variables will be used by the Vite build process.
# Placeholders should be replaced with production values in the Cloudflare Pages Dashboard.
VITE_FIREBASE_API_KEY = "YOUR_PRODUCTION_FIREBASE_API_KEY"
VITE_FIREBASE_AUTH_DOMAIN = "YOUR_PRODUCTION_FIREBASE_AUTH_DOMAIN.firebaseapp.com"
VITE_FIREBASE_PROJECT_ID = "YOUR_PRODUCTION_FIREBASE_PROJECT_ID"
VITE_FIREBASE_STORAGE_BUCKET = "YOUR_PRODUCTION_FIREBASE_STORAGE_BUCKET.appspot.com"
VITE_FIREBASE_MESSAGING_SENDER_ID = "YOUR_PRODUCTION_FIREBASE_MESSAGING_SENDER_ID"
VITE_FIREBASE_APP_ID = "YOUR_PRODUCTION_FIREBASE_APP_ID"
VITE_JHORA_API_URL = "https://your-production-backend-api.run.app"
